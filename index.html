<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Страница не найдена</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        .code {
            font-size: 180px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
            letter-spacing: 15px;
            line-height: 1;
        }

        .title {
            font-size: 28px;
            color: #e2e2e2;
            margin: 20px 0 15px;
            font-weight: 500;
        }

        .text {
            color: #a0a0b0;
            font-size: 16px;
            line-height: 1.6;
        }

        hr {
            width: 80px;
            height: 2px;
            background: #764ba2;
            border: none;
            margin: 25px auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <div class="title">Страница не найдена</div>
        <hr>
        <div class="text">
            Извините, запрашиваемая страница не существует или была перемещена.
        </div>
    </div>
</body>
</html>
